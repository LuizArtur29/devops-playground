version: '3.8'

networks:
  helpdesk-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:

services:
  postgres-db:
    image: postgres:16-alpine
    container_name: helpdesk-postgres
    networks:
      - helpdesk-network
    environment:
      POSTGRES_DB: helpdesk_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d helpdesk_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-cache:
    image: redis:7.2-alpine
    container_name: helpdesk-redis
    networks:
      - helpdesk-network
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq-broker:
    image: rabbitmq:3.13-management-alpine
    container_name: helpdesk-rabbitmq
    networks:
      - helpdesk-network
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  helpdesk-api:
    image: helpdesk-api:1.0.0
    container_name: helpdesk-api-app
    build:
      context: backend
      dockerfile: infra/docker/Dockerfile
    networks:
      - helpdesk-network
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres-db
      DB_PORT: 5432
      DB_NAME: helpdesk_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      SPRING_DATA_REDIS_HOST: redis-cache
      SPRING_DATA_REDIS_PORT: 6379
    depends_on:
      postgres-db:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      rabbitmq-broker:
        condition: service_healthy